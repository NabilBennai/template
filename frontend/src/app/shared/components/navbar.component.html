<header class="sticky top-0 z-50 w-full border-b border-slate-200 bg-white/95 backdrop-blur">
  <nav aria-label="Global" class="mx-auto flex w-full max-w-6xl items-center justify-between px-4 py-3">
    <a class="inline-flex items-center gap-2 text-sm font-semibold text-slate-900" routerLink="/">
      <span class="inline-flex h-8 w-8 items-center justify-center rounded-lg bg-slate-900 text-white">T</span>
      <span>{{ 'nav.brand' | translate }}</span>
    </a>

    <button
      aria-controls="navbar-collapse"
      aria-label="Menu"
      class="hs-collapse-toggle inline-flex items-center justify-center rounded-md border border-slate-200 p-2 text-slate-700 md:hidden"
      data-hs-collapse="#navbar-collapse"
      type="button">
      <svg class="h-5 w-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <path d="M3 6h18M3 12h18M3 18h18"></path>
      </svg>
    </button>

    <div class="hs-collapse hidden grow basis-full md:block" id="navbar-collapse">
      <div class="mt-3 flex flex-col gap-2 md:mt-0 md:flex-row md:items-center md:justify-end md:gap-3">
        <a class="text-sm text-slate-600" routerLink="/app"
           routerLinkActive="text-slate-900 font-semibold">{{ 'nav.dashboard' | translate }}</a>

        @if (isAuthenticated && isAdmin) {
          <a class="text-sm text-slate-600" routerLink="/admin"
             routerLinkActive="text-slate-900 font-semibold">{{ 'nav.admin' | translate }}</a>
        }

        @if (!isAuthenticated) {
          <a class="text-sm text-slate-600" routerLink="/login"
             routerLinkActive="text-slate-900 font-semibold">{{ 'auth.login' | translate }}</a>
          <a class="inline-flex items-center justify-center rounded-md bg-slate-900 px-3 py-2 text-sm font-medium text-white"
             routerLink="/register">
            {{ 'auth.register' | translate }}
          </a>
        } @else {
          <button
            (click)="logout()"
            class="inline-flex items-center justify-center rounded-md border border-slate-300 px-3 py-2 text-sm font-medium text-slate-700 hover:bg-slate-50"
            type="button">
            {{ 'nav.logout' | translate }}
          </button>
        }

        <button
          (click)="toggleLanguage()"
          class="inline-flex items-center justify-center rounded-md border border-slate-300 px-3 py-2 text-sm font-medium text-slate-700 hover:bg-slate-50"
          type="button">
          {{ currentLang === 'fr' ? 'EN' : 'FR' }}
        </button>
      </div>
    </div>
  </nav>
</header>
