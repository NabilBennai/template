spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/appdb}
    username: ${SPRING_DATASOURCE_USERNAME:app}
    password: ${SPRING_DATASOURCE_PASSWORD:app123}
  jpa:
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true
  messages:
    basename: i18n/messages
jwt:
  secret: ${JWT_SECRET:change_me_dev_secret_change_me_dev_secret}
  expiration-ms: ${JWT_EXPIRATION_MS:900000}
  refresh-expiration-ms: ${JWT_REFRESH_EXPIRATION_MS:604800000}
management:
  endpoints:
    web:
      exposure:
        include: health,info
