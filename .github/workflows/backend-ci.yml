name: backend-ci
on:
  push:
    paths:
      - 'backend/**'
      - 'mvnw'
      - 'mvnw.cmd'
      - '.mvn/**'
      - '.github/workflows/backend-ci.yml'
  pull_request:
    paths:
      - 'backend/**'
      - 'mvnw'
      - 'mvnw.cmd'
      - '.mvn/**'
      - '.github/workflows/backend-ci.yml'
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: maven
      - run: chmod +x mvnw
      - run: ./mvnw -f backend/pom.xml clean verify
