name: docker-ci
on:
  push:
    paths:
      - 'frontend/**'
      - 'backend/**'
      - 'docker-compose.yml'
      - '.env.example'
      - '.github/workflows/docker-ci.yml'
  pull_request:
    paths:
      - 'frontend/**'
      - 'backend/**'
      - 'docker-compose.yml'
      - '.env.example'
      - '.github/workflows/docker-ci.yml'
jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: cp .env.example .env
      - run: docker compose config
      - run: docker build -t template-frontend ./frontend
      - run: docker build -t template-backend ./backend
